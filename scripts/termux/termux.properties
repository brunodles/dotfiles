# Termux configuration — shared between android hosts
# ==================================================

# Extra keys row — useful shortcuts for Termux
extra-keys = [ \
  ['ESC', '/', '|', '-', '_', '~', 'TAB'], \
  ['CTRL', 'ALT', 'FN', 'UP', 'DOWN', 'LEFT', 'RIGHT'] \
]

# Use dark theme
use-black-ui = true

# Disable vibration on back key
bell-character = ignore

# Enable Ctrl+letter shortcuts
enforce-char-based-input = false

# Keyboard shortcuts
# Open extra keys with long-press on KEYBOARD button
extra-keys-style = both

# Show extra keys by default (handy for terminal use)
extra-keys-hidden = false
