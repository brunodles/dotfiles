# unbound.conf — DNS forwarder for redundant homelab DNS
#
# Primary DNS: Pi-hole on the LAN (fast, ad-blocking)
# Fallback:    Cloudflare DNS-over-TLS (when Pi-hole is unreachable)
#
# For Pi-hole address, see host/pi/ or your router's DHCP config.
# Requires:   pkg install unbound
# Config:     copy to $PREFIX/etc/unbound/unbound.conf
# Start:      sv up unbound  (via termux-services)
#
# ── Server options ──

server:
    # Listen on all interfaces, port 53
    interface: 0.0.0.0
    port: 53

    # Allow queries from LAN (adjust subnet to match your network)
    access-control: 192.168.0.0/16 allow
    access-control: 10.0.0.0/8 allow
    access-control: 127.0.0.0/8 allow

    # Logging (minimal — uncomment for debugging)
    # verbosity: 1
    # logfile: ""
    # use-syslog: yes

    # Privacy
    hide-identity: yes
    hide-version: yes

    # Cache
    cache-min-ttl: 300
    cache-max-ttl: 86400

    # Prefetch popular records
    prefetch: yes
    prefetch-key: yes

    # Rate limiting (per client)
    ratelimit: 1000

# ── Forwarding ──
#
# Primary forward goes to Pi-hole for ad-blocking + LAN DNS.
# TLS fallback kicks in if the primary is unreachable.

forward-zone:
    name: "."
    # Pi-hole (adjust IP to match your Pi's Pi-hole address)
    forward-addr: 192.168.1.53
    # TLS fallback — Cloudflare (1.1.1.1) with authentication
    forward-addr: 1.1.1.1@853#cloudflare-dns.com
    forward-addr: 1.0.0.1@853#cloudflare-dns.com
    # TLS fallback — Quad9 (9.9.9.9)
    # forward-addr: 9.9.9.9@853#dns.quad9.net

    # Forward all queries unconditionally (no recursion locally)
    forward-first: no
