# Penpot — Open-source design & prototyping platform
# https://github.com/penpot/penpot

services:
  penpot-frontend:
    image: "penpotapp/frontend:${PENPOT_VERSION:-2.16}"
    container_name: penpot
    restart: unless-stopped
    depends_on:
      - penpot-backend
      - penpot-exporter
      - penpot-mcp
    volumes:
      - penpot_assets:/opt/data/assets
    networks:
      - penpot
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.penpot.rule=Host(`penpot.lab`)"
      - "traefik.http.routers.penpot.entrypoints=web"
      - "traefik.http.services.penpot.loadbalancer.server.port=8080"
    environment:
      PENPOT_PUBLIC_URI: ${PENPOT_PUBLIC_URI:-http://penpot.lab}
      PENPOT_FLAGS: ${PENPOT_FLAGS:-disable-email-verification disable-secure-session-cookies}
      PENPOT_HTTP_SERVER_MAX_BODY_SIZE: 367001600

  penpot-backend:
    image: "penpotapp/backend:${PENPOT_VERSION:-2.16}"
    container_name: penpot-backend
    restart: unless-stopped
    depends_on:
      penpot-postgres:
        condition: service_healthy
      penpot-valkey:
        condition: service_healthy
    volumes:
      - penpot_assets:/opt/data/assets
    networks:
      - penpot
    environment:
      PENPOT_PUBLIC_URI: ${PENPOT_PUBLIC_URI:-http://penpot.lab}
      PENPOT_FLAGS: ${PENPOT_FLAGS:-disable-email-verification disable-secure-session-cookies}
      PENPOT_SECRET_KEY: ${PENPOT_SECRET_KEY}
      PENPOT_DATABASE_URI: postgresql://penpot-postgres/penpot
      PENPOT_DATABASE_USERNAME: penpot
      PENPOT_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      PENPOT_REDIS_URI: redis://penpot-valkey/0
      PENPOT_ASSETS_STORAGE_BACKEND: assets-fs
      PENPOT_STORAGE_ASSETS_FS_DIRECTORY: /opt/data/assets
      PENPOT_HTTP_SERVER_MAX_BODY_SIZE: 367001600
      PENPOT_TELEMETRY_ENABLED: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6060/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  penpot-exporter:
    image: "penpotapp/exporter:${PENPOT_VERSION:-2.16}"
    container_name: penpot-exporter
    restart: unless-stopped
    depends_on:
      penpot-valkey:
        condition: service_healthy
    networks:
      - penpot
    environment:
      PENPOT_PUBLIC_URI: ${PENPOT_PUBLIC_URI:-http://penpot.lab}
      PENPOT_SECRET_KEY: ${PENPOT_SECRET_KEY}
      PENPOT_REDIS_URI: redis://penpot-valkey/0
      PENPOT_INTERNAL_URI: http://penpot-frontend:8080

  penpot-mcp:
    image: "penpotapp/mcp:${PENPOT_VERSION:-2.16}"
    container_name: penpot-mcp
    restart: unless-stopped
    networks:
      - penpot

  penpot-postgres:
    image: postgres:15
    container_name: penpot-postgres
    restart: unless-stopped
    stop_signal: SIGINT
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penpot"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s
    volumes:
      - penpot_db:/var/lib/postgresql/data
    networks:
      - penpot
    environment:
      POSTGRES_INITDB_ARGS: --data-checksums
      POSTGRES_DB: penpot
      POSTGRES_USER: penpot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  penpot-valkey:
    image: valkey/valkey:8.1
    container_name: penpot-valkey
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - penpot
    environment:
      VALKEY_EXTRA_FLAGS: --maxmemory 128mb --maxmemory-policy volatile-lfu

networks:
  proxy:
    name: proxy
    external: true
  penpot:
    driver: bridge

volumes:
  penpot_db:
    driver: local
  penpot_assets:
    driver: local
