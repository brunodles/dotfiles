services:
  gitea:
    image: gitea/gitea:1.22.4
    hostname: gitea
    restart: unless-stopped
    environment:
      USER: "git"
      RUN_USER: "git"
      USER_GID: "1000"
      USER_UID: "1000"

      # ── Skip web installer ──────────────────
      INSTALL_LOCK: "true"

      # ── Only admin-created users ────────────
      DISABLE_REGISTRATION: "true"

      # ── HTTP-only (no SSH) ──────────────────
      DISABLE_SSH: "true"
      START_SSH_SERVER: "false"

      # ── Domain / URL ────────────────────────
      DOMAIN: gitea.lab
      ROOT_URL: http://gitea.lab/
      GITEA__server__PROTOCOL: http
      GITEA__server__DOMAIN: gitea.lab
      GITEA__server__ROOT_URL: http://gitea.lab/

    volumes:
      - $DOCKGE_DATA_DIR/gitea_vps/data:/data

    networks:
      - proxy

    labels:
      - traefik.enable=true
      - traefik.http.routers.gitea.rule=Host(`gitea.vps`)
      - traefik.http.routers.gitea.entrypoints=web
      - traefik.http.services.gitea.loadbalancer.server.port=3000

networks:
  proxy:
    name: proxy
    external: true
