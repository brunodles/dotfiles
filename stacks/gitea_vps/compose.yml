services:
  # ── Gitea server ──────────────────────────────────────────────────────
  gitea:
    image: gitea/gitea:1.22.4
    hostname: gitea
    restart: unless-stopped
    environment:
      USER: "git"
      RUN_USER: "git"
      USER_GID: "1000"
      USER_UID: "1000"
      INSTALL_LOCK: "true"
      DISABLE_REGISTRATION: "true"
      DISABLE_SSH: "true"
      START_SSH_SERVER: "false"
      DOMAIN: gitea.vps
      ROOT_URL: http://gitea.vps/
      GITEA__server__PROTOCOL: http
      GITEA__server__DOMAIN: gitea.vps
      GITEA__server__ROOT_URL: http://gitea.vps/

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

    volumes:
      - $DOCKGE_DATA_DIR/gitea_vps/data:/data

    networks:
      - proxy

    labels:
      - traefik.enable=true
      - traefik.http.routers.gitea.rule=Host(`gitea.vps`)
      - traefik.http.routers.gitea.entrypoints=web
      - traefik.http.services.gitea.loadbalancer.server.port=3000

  # ── One-time setup (init container) ───────────────────────────────────
  gitea-setup:
    image: gitea/gitea:1.22.4
    depends_on:
      gitea:
        condition: service_healthy
    restart: no
    volumes:
      - $DOCKGE_DATA_DIR/gitea_vps/data:/data
      - ./setup/init.sh:/setup/init.sh:ro
    environment:
      GITEA_ADMIN_PASS: ${GITEA_ADMIN_PASS:?required}
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-bruno}
      GITEA_ADMIN_EMAIL: ${GITEA_ADMIN_EMAIL:-bruno@vps}
      HERMES_PASS: ${HERMES_PASS:-changeme-on-first-login}
      DOCS_WEBHOOK_SECRET: ${DOCS_WEBHOOK_SECRET:-}
    entrypoint: ["/bin/bash", "/setup/init.sh"]
    networks:
      - proxy

networks:
  proxy:
    name: proxy
    external: true
