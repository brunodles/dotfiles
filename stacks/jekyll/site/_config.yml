# ── Site ─────────────────────────────────────────────────────
title: "Home"
description: "My corner of the web"
baseurl: ""
url: ""

# ── Build ────────────────────────────────────────────────────
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# ── Layouts ──────────────────────────────────────────────────
defaults:
  - scope:
      path: ""
    values:
      layout: default
  # ── Docstore (mounted from docs_data volume) ──────────────────
  - scope:
      path: "docs"
    values:
      layout: default
      permalink: /docs/:path/
