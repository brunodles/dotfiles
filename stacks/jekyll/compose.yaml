services:
  jekyll:
    image: jekyll/jekyll:latest
    container_name: jekyll
    hostname: jekyll
    command: jekyll serve --watch --force_polling --host 0.0.0.0 --port 4000
    volumes:
      - ./site:/srv/jekyll
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jekyll.rule=Host(`jekyll.lab`)"
      - "traefik.http.routers.jekyll.entrypoints=web"
      - "traefik.http.services.jekyll.loadbalancer.server.port=4000"

networks:
  proxy:
    name: proxy
    external: true
