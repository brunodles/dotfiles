# ──────────────────────────────────────────────
# dnsmasq.conf — DNS forwarder for Android server
# ──────────────────────────────────────────────
#
# This file is a reference example of what scripts/dns/apply-dns.sh
# generates from scripts/dns/dns-config.yaml. The actual generated
# config may differ slightly (e.g. port=53, interface, bind-interfaces).
#
# Manual edits will be overwritten on next apply.
#
# To regenerate:
#   cd ~/dotfiles
#   bash scripts/dns/apply-dns.sh --host android
#
# ── Upstreams ──
server=192.168.1.53    # Pi-hole (primary)
server=1.1.1.1         # Cloudflare (fallback)
server=1.0.0.1         # Cloudflare (fallback)

# ── Domínios locais ──
local=/lab/
local=/home/

# ── Hosts estáticos ──
address=/media.lab/192.168.1.10
address=/pi.lab/192.168.1.20
address=/pihole.lab/192.168.1.20
address=/admin.lab/192.168.1.20
address=/android.lab/192.168.1.30
address=/silver.lab/192.168.1.40

# ── CNAMEs — serviços ──
cname=jellyfin.lab,media.lab
cname=immich.lab,media.lab
cname=photos.lab,immich.lab
cname=plex.lab,media.lab
cname=traefik.lab,media.lab
cname=metube.lab,media.lab
cname=qbittorrent.lab,media.lab

# ── ACL ──
domain-needed
bogus-priv
expand-hosts
